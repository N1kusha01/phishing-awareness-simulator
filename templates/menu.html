<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <title>ფიშინგ სიმულატორი</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #0f172a;
            color: white;
            padding-top: 50px;
        }
        
        h1 {
            color: #38bdf8;
        }

        p {
            color: #94a3b8;
        }

        .box {
            background-color: #1e293b;
            border: 2px solid #334155;
            border-radius: 10px;
            width: 250px;
            padding: 20px;
            margin: 15px;
            display: inline-block;
            vertical-align: top;
        }

        .logo {
            width: 50px;
            height: 50px;
            margin-bottom: 10px;
        }

        .btn {
            display: block;
            margin: 10px auto;
            padding: 12px;
            text-decoration: none;
            color: white;
            font-size: 16px;
            border-radius: 5px;
            font-weight: bold;
        }

        .btn-preview {
            background-color: #475569;
        }

        .btn-gen {
            background-color: #38bdf8;
            color: #0f172a;
        }

        .result {
            margin-top: 30px;
            padding: 15px;
            background-color: #1e293b;
            border: 1px solid #38bdf8;
            display: inline-block;
            border-radius: 8px;
        }

    </style>
</head>
<body>
    <h1>აირჩიეთ სიმულაციის სამიზნე</h1>
    <p>ეს არის საგანმანათლებლო პროექტი.</p>
    
    <div class="box">
        <img src="https://upload.wikimedia.org/wikipedia/en/0/04/Facebook_f_logo_%282021%29.svg" class="logo">
        <h3>Facebook</h3>
        <a href="facebook" class="btn btn-preview" target="_blank">ნახვა</a>
        <a href="/?platform=facebook" class="btn btn-gen">ლინკის გენერირება</a>
    </div>

    <div class="box">
        <img src="https://upload.wikimedia.org/wikipedia/commons/9/95/Instagram_logo_2022.svg" class="logo">
        <h3>Instagram</h3>
        <a href="instagram" class="btn btn-preview" target="_blank">ნახვა</a>
        <a href="/?platform=instagram" class="btn btn-gen">ლინკის გენერირება</a>
    </div>

    <div class="box">
        <img src="https://upload.wikimedia.org/wikipedia/commons/7/7e/Gmail_icon_%282020%29.svg" class="logo">
        <h3>Gmail</h3>
        <a href="gmail" class="btn btn-preview" target="_blank">ნახვა</a>
        <a href="/?platform=gmail" class="btn btn-gen">ლინკის გენერირება</a>
    </div>

    <br><br>
    {% if link %}
        <div>
            <h3>გენერირებული მისამართი</h3>
            <a href="{{ link }}" target="_blank" style="color: #38bdf8; font-weight: bold;">{{ link }}</a>
        </div>
    {% endif %}
</body>
</html>
