<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <title>ფიშინგ სიმულატორი</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background-color: #f4f4f9; padding-top: 50px; }
        h1 { color: #333; }
        .btn { display: block; width: 250px; margin: 15px auto; padding: 15px; text-decoration: none; color: white; font-size: 18px; border-radius: 5px; font-weight: bold; }
        .fb { background-color: #1877f2; }
        .ig { background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); }
        .gm { background-color: #D44638; }
    </style>
</head>
<body>
    <h1>აირჩიეთ სიმულაციის სამიზნე</h1>
    <p>ეს არის საგანმანათლებლო პროექტი.</p>
    
    <a href="/facebook" class="btn fb">Facebook Login</a>
    <a href="/instagram" class="btn ig">Instagram Login</a>
    <a href="/gmail" class="btn gm">Gmail Login</a>
</body>
</html>
